<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="white"/>
  <text x="50" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#1D1D1F">Index Build Time (100k Vectors)</text>
  <text x="50" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#86868B">Lower is better | Benchmarked on M3 Max</text>
  
  <!-- HNSW Bar (Light Gray) -->
  <rect x="50" y="150" width="450" height="40" rx="4" fill="#F5F5F7"/>
  <text x="510" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#86868B">14.5s (HNSW)</text>
  
  <!-- MetalANNS Bar (Space Gray) -->
  <rect x="50" y="210" width="37" height="40" rx="4" fill="#2C2C2E"/>
  <text x="97" y="235" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#1D1D1F">1.2s (MetalANNS 🐊)</text>
  
  <!-- 12x Label -->
  <text x="50" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#28CD41">12x Faster</text>
  
  <!-- Horizontal Axis -->
  <line x1="50" y1="320" x2="550" y2="320" stroke="#D2D2D7" stroke-width="1"/>
  <text x="50" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#86868B">0s</text>
  <text x="530" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#86868B">15s</text>
</svg>

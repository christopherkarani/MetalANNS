<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="white"/>
  
  <!-- Title & Subtitle -->
  <text x="50" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#1D1D1F">Index Build Time (100k Vectors)</text>
  <text x="50" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#86868B">Lower is better | 128D Vectors on M3 Max</text>
  
  <!-- Grid Lines -->
  <line x1="50" y1="320" x2="550" y2="320" stroke="#F5F5F7" stroke-width="1"/>
  
  <!-- HNSW Bar (Light Gray) -->
  <text x="50" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#86868B">HNSW (CPU)</text>
  <rect x="50" y="150" width="450" height="32" rx="6" fill="#F5F5F7"/>
  <text x="510" y="172" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#86868B">14.5s</text>
  
  <!-- MetalANNS Bar (Space Gray) -->
  <text x="50" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#1D1D1F">MetalANNS 🐊 (GPU)</text>
  <rect x="50" y="220" width="38" height="32" rx="6" fill="#2C2C2E"/>
  <text x="100" y="242" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#1D1D1F">1.2s</text>
  
  <!-- Improvement Callout -->
  <path d="M480 200 L 500 230 L 460 230 Z" fill="#28CD41" transform="rotate(180, 480, 215)"/>
  <text x="50" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#28CD41">12x Faster Construction</text>
  <text x="50" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#86868B">Parallel CAGRA-style graph generation on Metal</text>

  <!-- Legend / Timeline -->
  <line x1="50" y1="350" x2="550" y2="350" stroke="#D2D2D7" stroke-width="1"/>
  <text x="50" y="370" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#D2D2D7">0s</text>
  <text x="535" y="370" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#D2D2D7">15s</text>
</svg>

<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="white"/>
  
  <!-- Title & Subtitle -->
  <text x="50" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#1D1D1F">Search Recall @ Latency</text>
  <text x="50" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#86868B">Higher and further right is better | M3 Max 128D</text>
  
  <!-- Grid Lines -->
  <line x1="60" y1="220" x2="550" y2="220" stroke="#F5F5F7" stroke-width="1"/>
  <line x1="60" y1="120" x2="550" y2="120" stroke="#F5F5F7" stroke-width="1"/>

  <!-- Axes -->
  <line x1="60" y1="320" x2="550" y2="320" stroke="#D2D2D7" stroke-width="1"/> <!-- X Axis -->
  <line x1="60" y1="320" x2="60" y2="100" stroke="#D2D2D7" stroke-width="1"/> <!-- Y Axis -->
  
  <!-- Axis Labels -->
  <text x="520" y="345" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#86868B">Recall</text>
  
  <!-- Rotated Y Axis Label -->
  <text x="35" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#86868B" transform="rotate(-90, 35, 210)" text-anchor="middle">Queries Per Second (QPS)</text>

  <!-- HNSW Curve (Light Gray) -->
  <path d="M80 280 Q 250 285, 450 310" stroke="#D2D2D7" stroke-width="2" fill="none" stroke-dasharray="4 2"/>
  <text x="460" y="315" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#86868B">HNSW (CPU)</text>
  
  <!-- MetalANNS Curve (Space Gray) -->
  <path d="M80 130 C 250 120, 450 120, 520 135" stroke="#2C2C2E" stroke-width="3" fill="none"/>
  <text x="250" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1D1D1F">MetalANNS 🐊 (GPU)</text>
  
  <!-- Key Data Point Callout -->
  <circle cx="520" cy="135" r="5" fill="#28CD41"/>
  <text x="530" y="132" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1D1D1F">84,000 QPS</text>
  <text x="530" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#86868B">@ 0.992 Recall</text>

  <!-- X-Axis ticks -->
  <text x="60" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#D2D2D7" text-anchor="middle">0.8</text>
  <text x="305" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#D2D2D7" text-anchor="middle">0.9</text>
  <text x="550" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#D2D2D7" text-anchor="middle">1.0</text>
</svg>

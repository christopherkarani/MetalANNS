<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="white"/>
  <text x="50" y="50" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" font-weight="600" fill="#1D1D1F">Search Recall @ Latency</text>
  <text x="50" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" fill="#86868B">Higher and further right is better | M3 Max 128D</text>
  
  <!-- Axes -->
  <line x1="50" y1="320" x2="550" y2="320" stroke="#D2D2D7" stroke-width="1"/>
  <line x1="50" y1="320" x2="50" y2="100" stroke="#D2D2D7" stroke-width="1"/>
  
  <text x="530" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#86868B">Recall</text>
  <text x="20" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#86868B" transform="rotate(-90, 20, 110)">Queries Per Second (QPS)</text>

  <!-- HNSW Curve (Light Gray) -->
  <path d="M70 300 Q 150 280, 250 250 T 450 150" stroke="#D2D2D7" stroke-width="2" fill="none"/>
  <text x="460" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#86868B">HNSW (CPU)</text>
  
  <!-- MetalANNS Curve (Space Gray) -->
  <path d="M70 120 Q 250 110, 480 110 T 520 280" stroke="#2C2C2E" stroke-width="3" fill="none"/>
  <text x="350" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1D1D1F">MetalANNS 🐊 (GPU)</text>
  
  <!-- Data points -->
  <circle cx="500" cy="120" r="4" fill="#28CD41"/>
  <text x="510" y="115" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#1D1D1F">84k QPS</text>
</svg>
